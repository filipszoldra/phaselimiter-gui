name: build-server

# Builds the Linux HTTP server binary + Docker image for Cloud Run.
#
# Required GitHub secrets:
#   GH_PHASELIMITER_TOKEN  — PAT with `repo` + `actions:read` scopes on the
#                            phaselimiter engine repo (to download engine artifact)
#   GCP_SA_KEY             — Service account JSON key with roles:
#                              Artifact Registry Writer
#                              Cloud Run Admin
#                              Service Account User
#
# Required env vars in the workflow (edit before first run):
#   ENGINE_REPO     — owner/repo for the phaselimiter engine (default below)
#   ENGINE_RUN_ID   — GitHub Actions run ID that produced `engine-bin-linux`
#   GCP_PROJECT     — Google Cloud project ID
#   GCP_REGION      — Cloud Run region (europe-west1 recommended for EU)
#   AR_REPO         — Artifact Registry repo name (e.g. phaselimiter)
#   SERVICE_NAME    — Cloud Run service name

on:
  workflow_dispatch:
    inputs:
      engine_run_id:
        description: 'Run ID for engine-bin-linux artifact (phaselimiter repo)'
        required: false

env:
  ENGINE_REPO: filipszoldra/phaselimiter
  ENGINE_RUN_ID: ${{ github.event.inputs.engine_run_id || '' }}
  GCP_PROJECT: phaselimiter-fs
  GCP_REGION: europe-central2
  AR_REPO: phaselimiter
  SERVICE_NAME: phaselimiter

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: build server binary (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o phaselimiter-server .

      - name: download engine-bin-linux artifact
        env:
          GH_TOKEN: ${{ secrets.GH_PHASELIMITER_TOKEN }}
        run: |
          RUN_ID="$ENGINE_RUN_ID"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list --repo "$ENGINE_REPO" --workflow build-engine-linux.yml \
              --status success --limit 1 --json databaseId --jq '.[0].databaseId')
            echo "Auto-detected latest successful engine run: $RUN_ID"
          fi
          gh run download "$RUN_ID" \
            --repo "$ENGINE_REPO" \
            --name engine-bin-linux \
            --dir engine-artifact
          echo "=== engine artifact contents ==="
          ls -lh engine-artifact/ engine-artifact/bin/ 2>/dev/null || ls -lhR engine-artifact/

      - name: assemble phaselimiter/ directory for Docker
        run: |
          mkdir -p phaselimiter/bin
          # Artifact may be flat (phase_limiter, audio_analyzer, lib*.so* all top-level)
          # or nested under engine-artifact/bin/. Handle both.
          if [ -d engine-artifact/bin ] && [ -n "$(ls -A engine-artifact/bin/)" ]; then
            cp -r engine-artifact/bin/. phaselimiter/bin/
          else
            cp -r engine-artifact/. phaselimiter/bin/
          fi
          chmod +x phaselimiter/bin/phase_limiter phaselimiter/bin/audio_analyzer || true
          echo "=== phaselimiter/bin ==="
          ls -lh phaselimiter/bin/
          echo "=== .so count: $(ls phaselimiter/bin/*.so* 2>/dev/null | wc -l) ==="

      - name: checkout phaselimiter resource files
        env:
          GH_TOKEN: ${{ secrets.GH_PHASELIMITER_TOKEN }}
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://x-access-token:${GH_TOKEN}@github.com/${{ env.ENGINE_REPO }}.git \
            phaselimiter-src
          cd phaselimiter-src && git sparse-checkout set resource && cd ..
          cp -r phaselimiter-src/resource phaselimiter/resource
          rm -rf phaselimiter-src
          # sound_quality2_cache: boost::binary_archive from Windows is not portable to Linux.
          # Re-generate it on Linux using audio_analyzer --mode sound_quality2_preparation
          # with the 568 pre-computed analysis JSON files from analysis_data/.
          # Falls back to Windows cache (which still causes mastering5 to crash) if this fails.
          echo "=== generating Linux sound_quality2_cache ==="
          LD_LIBRARY_PATH=phaselimiter/bin \
            phaselimiter/bin/audio_analyzer \
              --mode sound_quality2_preparation \
              --sound_quality2_cache phaselimiter/resource/sound_quality2_cache \
              --analysis_data_dir phaselimiter/resource/analysis_data \
          && echo "Linux sound_quality2_cache generated OK" \
          || { echo "WARNING: preparation failed — using Windows cache (mastering5 will crash)"; \
               cp resource_extra/sound_quality2_cache phaselimiter/resource/sound_quality2_cache; }
          ls -lh phaselimiter/resource/sound_quality2_cache || true
          echo "=== phaselimiter/resource ==="
          ls -lh phaselimiter/resource/

      - name: smoke test server binary
        run: |
          timeout 3 ./phaselimiter-server &
          sleep 2
          curl -sf http://localhost:8080/api/reference || echo "(reference missing — resource/ not bundled yet)"
          wait || true

      - name: build Docker image
        run: |
          docker build -t server-local:latest .
          echo "Docker image built successfully"

      - name: authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: push image to Artifact Registry and deploy to Cloud Run
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/server:${GITHUB_SHA::8}"
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker tag server-local:latest "$IMAGE"
          docker push "$IMAGE"
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 1 \
            --concurrency 1 \
            --memory 4Gi \
            --cpu 2 \
            --timeout 3600 \
            --execution-environment gen2 \
            --quiet
          echo "Deployed: $(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')"

      - name: upload server binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: phaselimiter-server-linux
          path: phaselimiter-server
