name: build-win
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      # Pure-Go, cgo-free WebView2 + native dialogs: no mingw/GTK/Node needed.
      # `go mod tidy` resolves go-webview2 + zenity (and transitives) and writes go.sum.
      - run: go mod tidy
      - name: build windowed (.exe hides console)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-H windowsgui" -o phaselimiter-gui.exe
      - name: build console/debug variant
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o phaselimiter-gui-console.exe
      - name: collect results
        run: |
          mkdir -p /tmp/results
          mv phaselimiter-gui.exe phaselimiter-gui-console.exe /tmp/results/
          cp go.mod go.sum /tmp/results/ || true
          [ -d licenses ] && cp -r licenses /tmp/results/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: /tmp/results
